apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: homarr
    releaseName: homarr
    repo: oci://ghcr.io/homarr-labs/charts/
    version: 5.6.0
    includeCRDs: true
    valuesFile: ../../../base/servarr/homarr/values.yaml
    additionalValuesFiles:
      - values.override.yaml

resources:
  - ../../../base/servarr/homarr

patches:
  - path: patch-route-hostname.yaml
