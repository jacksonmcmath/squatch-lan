apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: homarr
  namespace: homarr
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`servarr.kube.local.squatch.dev`)
      services:
        - name: homarr
          port: 8080
  tls:
    certResolver: default
