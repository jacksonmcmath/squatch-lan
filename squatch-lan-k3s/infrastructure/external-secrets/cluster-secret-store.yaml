apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: op-secret-store
  namespace: external-secrets
spec:
  provider:
    onepassword:
      connectHost: https://onepassword-connect:8080
      vaults:
        - name: Squatch LAN
      auth:
        secretRef:
          connectTokenSecretRef:
            name: op-connect-token-eso
            key: token
